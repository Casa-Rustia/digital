      <stop offset="0" stop-color="#f7cf7a"/>
      <stop offset="0.45" stop-color="#dca84b"/>
      <stop offset="1" stop-color="#9b6939"/>
    </linearGradient>
    <linearGradient id="brown" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6b422c"/>
