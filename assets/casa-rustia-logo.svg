<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="title desc">
  <title id="title">Casa Rustia Creative Digital Services logo</title>
  <desc id="desc">Elegant CR monogram above the Casa Rustia wordmark.</desc>
